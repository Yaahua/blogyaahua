<footer class="site-footer">
    <section class="copyright">
        &copy; 
        {{ if and (.Site.Params.footer.since) (ne .Site.Params.footer.since (int (now.Format "2006"))) }}
            {{ .Site.Params.footer.since }} - 
        {{ end }}
        {{ now.Format "2006" }} {{ default .Site.Title .Site.Copyright }}
    </section>
    
    <section class="powerby">
        <div class="footer-motto">
            <span class="motto-zh">記錄 · 反思 · 學習</span>
            <span class="motto-en">Record · Reflection · Learning</span>
        </div>
    </section>
</footer>

<style>
/* 引入哥特體字體 (UnifrakturMaguntia) */
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');

.site-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

/* 版權信息行：字號最大 */
.site-footer .copyright {
    font-size: 1.5em; /* 設置為比下方格言更大的字號 */
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--card-text-color-main); /* 保持主題文本顏色 */
}

.site-footer .powerby {
    line-height: 1.6;
}

.footer-motto {
    text-align: center;
}

/* 繁體中文格言：楷體，字號次之 */
.footer-motto .motto-zh {
    font-size: 1.2em; 
    font-family: "Kaiti", "STKaiti", "楷体", "楷体_GB2312", serif;
    font-weight: normal;
    display: block;
    margin-bottom: 2px;
}

/* 英文格言：哥特體斜體，字號與中文相仿或略小 */
.footer-motto .motto-en {
    font-size: 1.2em; 
    font-family: 'UnifrakturMaguntia', serif;
    font-style: italic;
    display: block;
    margin-top: 2px;
}
</style>
