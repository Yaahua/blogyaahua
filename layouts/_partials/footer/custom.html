{{/* 懸浮回到頂部按鈕 - 可拖動 */}}
<button id="back-to-top" aria-label="回到頂部" title="回到頂部">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 15l-6-6-6 6"/>
    </svg>
</button>

<style>
#back-to-top {
    position: fixed;
    right: 2rem;
    bottom: 2rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-color, #5b7a9d);
    color: #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    transition: opacity 0.3s, visibility 0.3s, transform 0.3s, background 0.2s, box-shadow 0.2s;
    z-index: 9999;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
}
#back-to-top.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}
#back-to-top:hover {
    background: var(--accent-color-darker, #486a8e);
    box-shadow: 0 6px 20px rgba(0,0,0,0.24);
    transform: translateY(-2px);
}
#back-to-top.dragging {
    transition: none;
    transform: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    cursor: grabbing;
}
[data-scheme="dark"] #back-to-top {
    background: var(--accent-color, #7eb8da);
    color: #1a1a2e;
}
</style>

<script>
(function () {
    var btn = document.getElementById('back-to-top');
    if (!btn) return;

    /* ── 顯示 / 隱藏邏輯 ── */
    var scrollThreshold = 300;
    function onScroll() {
        if (window.scrollY > scrollThreshold) {
            btn.classList.add('visible');
        } else {
            btn.classList.remove('visible');
        }
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    /* ── 點擊回頂 ── */
    var isDragging = false;
    btn.addEventListener('click', function () {
        if (!isDragging) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    /* ── 拖動邏輯（同時支持滑鼠和觸控） ── */
    var startX, startY, startRight, startBottom;
    var dragMoved = false;
    var DRAG_THRESHOLD = 5; // px，超過才算拖動

    function getPos(e) {
        return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                         : { x: e.clientX, y: e.clientY };
    }

    function dragStart(e) {
        var pos = getPos(e);
        startX = pos.x;
        startY = pos.y;
        dragMoved = false;
        isDragging = false;

        // 讀取當前位置（right / bottom 相對視窗）
        var rect = btn.getBoundingClientRect();
        startRight  = window.innerWidth  - rect.right;
        startBottom = window.innerHeight - rect.bottom;

        document.addEventListener('mousemove', dragMove, { passive: false });
        document.addEventListener('mouseup',   dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend',  dragEnd);
    }

    function dragMove(e) {
        var pos = getPos(e);
        var dx = pos.x - startX;
        var dy = pos.y - startY;

        if (!isDragging && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
            isDragging = true;
            dragMoved  = true;
            btn.classList.add('dragging');
        }
        if (!isDragging) return;
        e.preventDefault();

        var newRight  = Math.max(8, Math.min(window.innerWidth  - 44 - 8, startRight  - dx));
        var newBottom = Math.max(8, Math.min(window.innerHeight - 44 - 8, startBottom - dy));

        btn.style.right  = newRight  + 'px';
        btn.style.bottom = newBottom + 'px';
    }

    function dragEnd() {
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup',   dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend',  dragEnd);

        if (isDragging) {
            btn.classList.remove('dragging');
            // 儲存位置到 localStorage
            localStorage.setItem('btt-right',  btn.style.right);
            localStorage.setItem('btt-bottom', btn.style.bottom);
        }
        // 延遲重置 isDragging，讓 click 事件先判斷
        setTimeout(function () { isDragging = false; }, 10);
    }

    btn.addEventListener('mousedown',  dragStart);
    btn.addEventListener('touchstart', dragStart, { passive: true });

    /* ── 恢復上次拖動位置 ── */
    var savedRight  = localStorage.getItem('btt-right');
    var savedBottom = localStorage.getItem('btt-bottom');
    if (savedRight && savedBottom) {
        btn.style.right  = savedRight;
        btn.style.bottom = savedBottom;
    }
})();
</script>
