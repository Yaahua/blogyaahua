<section class="article-share">
    <div class="share-container">
        <button id="copy-link-button" class="share-button" title="複製連結" data-url="{{ .Permalink }}">
            {{ partial "helper/icon" "link" }}
            <span>分享連結</span>
        </button>
        
        <a href="https://service.weibo.com/share/share.php?url={{ .Permalink }}&title={{ .Title }}" target="_blank" rel="noopener noreferrer" class="share-button qq" title="分享到 QQ">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
        </a>

        <a href="https://web.wechat.com/" target="_blank" rel="noopener noreferrer" class="share-button wechat" title="分享到微信">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
        </a>

        <a href="https://www.xiaohongshu.com/" target="_blank" rel="noopener noreferrer" class="share-button xiaohongshu" title="分享到小紅書">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
        </a>
    </div>
</section>

<script>
    document.getElementById('copy-link-button').addEventListener('click', function() {
        const url = this.getAttribute('data-url');
        navigator.clipboard.writeText(url).then(() => {
            const span = this.querySelector('span');
            const originalText = span.textContent;
            span.textContent = '已複製！';
            this.classList.add('copied');
            setTimeout(() => {
                span.textContent = originalText;
                this.classList.remove('copied');
            }, 2000);
        }).catch(err => {
            console.error('無法複製連結: ', err);
        });
    });
</script>

<style>
    .article-share {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--card-text-color-tertiary);
        opacity: 0.8;
    }
    .share-container {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .share-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background-color: var(--card-background);
        border: 1px solid var(--card-text-color-tertiary);
        border-radius: var(--tag-border-radius);
        color: var(--card-text-color-main);
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
        text-decoration: none;
    }
    .share-button:hover {
        background-color: var(--accent-color);
        color: var(--accent-color-text);
        border-color: var(--accent-color);
        transform: translateY(-2px);
    }
    .share-button.copied {
        background-color: #2ecc71;
        color: white;
        border-color: #2ecc71;
    }
    .share-button svg {
        width: 18px;
        height: 18px;
    }
    .share-button.qq:hover {
        background-color: #0066cc;
        border-color: #0066cc;
    }
    .share-button.wechat:hover {
        background-color: #09b83e;
        border-color: #09b83e;
    }
    .share-button.xiaohongshu:hover {
        background-color: #ff0000;
        border-color: #ff0000;
    }
</style>
