mainSections   = ["post"]
rssFullContent = true
SortBy         = "default"

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

[sidebar]
    compact = false
    avatar  = ""

[article]
    headingAnchor = false
    math          = false
    toc           = true
    readingTime   = true

    [article.list]
        showTags = true

    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]

    [[widgets.homepage]]
        type = "search"

    [[widgets.homepage]]
        type = "categories"

    [[widgets.homepage]]
        type = "tag-cloud"

    [[widgets.page]]
        type = "toc"

    [[widgets.page]]
        type = "categories"

    [[widgets.page]]
        type = "tag-cloud"

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing]
    autoOrient = false

    [imageProcessing.external]
        timeout = "5s"

    [imageProcessing.content]
        widths  = [800, 1600, 2400]
        enabled = true

    [imageProcessing.thumbnail]
        enabled = true

[comments]
    enabled  = false
    provider = ""
